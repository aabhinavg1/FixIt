1827">73.37</text><text x="445.5" y="176" font-size="11" fill="#111827">76.42</text><text x="246" y="214" text-anchor="end" font-size="13" fill="#111827">Rolling hash</text><rect x="260" y="194" width="115.1" height="12" fill="#d97706" rx="3"/><rect x="260" y="210" width="117.4" height="12" fill="#2563eb" rx="3"/><text x="383.1" y="204" font-size="11" fill="#111827">49.56</text><text x="385.4" y="220" font-size="11" fill="#111827">50.55</text><text x="246" y="258" text-anchor="end" font-size="13" fill="#111827">Row-major traversal</text><rect x="260" y="238" width="39.6" height="12" fill="#d97706" rx="3"/><rect x="260" y="254" width="39.7" height="12" fill="#2563eb" rx="3"/><text x="307.6" y="248" font-size="11" fill="#111827">17.05</text><text x="307.7" y="264" font-size="11" fill="#111827">17.09</text><text x="246" y="302" text-anchor="end" font-size="13" fill="#111827">Column-major traversal</text><rect x="260" y="282" width="343.8" height="12" fill="#d97706" rx="3"/><rect x="260" y="298" width="354.8" height="12" fill="#2563eb" rx="3"/><text x="611.8" y="292" font-size="11" fill="#111827">148.00</text><text x="622.8" y="308" font-size="11" fill="#111827">152.73</text><text x="246" y="346" text-anchor="end" font-size="13" fill="#111827">Small sort</text><rect x="260" y="326" width="176.1" height="12" fill="#d97706" rx="3"/><rect x="260" y="342" width="159.2" height="12" fill="#2563eb" rx="3"/><text x="444.1" y="336" font-size="11" fill="#111827">75.79</text><text x="427.2" y="352" font-size="11" fill="#111827">68.51</text><text x="246" y="390" text-anchor="end" font-size="13" fill="#111827">Prefix sum</text><rect x="260" y="370" width="64.9" height="12" fill="#d97706" rx="3"/><rect x="260" y="386" width="65.1" height="12" fill="#2563eb" rx="3"/><text x="332.9" y="380" font-size="11" fill="#111827">27.95</text><text x="333.1" y="396" font-size="11" fill="#111827">28.02</text><text x="246" y="434" text-anchor="end" font-size="13" fill="#111827">Bit mix</text><rect 